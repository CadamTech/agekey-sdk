name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for auto-fixable lint issues
        run: |
          npm run lint:fix
          if ! git diff --quiet; then
            echo "::error::Auto-fixable lint issues detected. Run 'npm run lint:fix' locally and commit the changes."
            git diff --stat
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  version-check:
    name: Version Increment Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check version was incremented
        run: |
          PR_VERSION=$(node -p "require('./package.json').version")
          BASE_VERSION=$(git show origin/${{ github.base_ref }}:package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")

          echo "Base (${{ github.base_ref }}): $BASE_VERSION"
          echo "PR branch:                    $PR_VERSION"

          node -e "
            const [baseMajor, baseMinor, basePatch] = '${BASE_VERSION}'.split('.').map(Number);
            const [prMajor, prMinor, prPatch] = '${PR_VERSION}'.split('.').map(Number);

            if (prMajor > baseMajor ||
                (prMajor === baseMajor && prMinor > baseMinor) ||
                (prMajor === baseMajor && prMinor === baseMinor && prPatch > basePatch)) {
              process.exit(0);
            }

            console.error('Version in package.json must be incremented before merging to ${{ github.base_ref }}.');
            console.error('Current: ${PR_VERSION}  Base: ${BASE_VERSION}');
            console.error('Run: npm version patch   (or minor / major)');
            process.exit(1);
          "
